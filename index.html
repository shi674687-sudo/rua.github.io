<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>デイリーチェックリスト</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    .streak {
      padding: 10px 14px;
      background: #fff;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .tasks {
      background: #fff;
      border-radius: 8px;
      padding: 8px 0;
      margin-bottom: 12px;
    }
    .task {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
    }
    .task:last-child {
      border-bottom: none;
    }
    .task input[type="checkbox"] {
      margin-right: 10px;
      transform: scale(1.3);
    }
    .task span {
      flex: 1;
      font-size: 15px;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }
    .primary {
      background: #4caf50;
      color: #fff;
    }
    .secondary {
      background: #e0e0e0;
    }
    .small {
      font-size: 12px;
      color: #777;
      text-align: right;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>デイリーチェックリスト</h1>
  <div class="sub" id="today"></div>

  <div class="streak">
    連続コンプリート日数：<span id="streak">0</span> 日
  </div>

  <div class="tasks" id="taskList"></div>

  <input type="text" id="newTask" placeholder="やることを追加">
  <div class="controls">
    <button class="primary" id="addTaskBtn">追加</button>
    <button class="secondary" id="resetTodayBtn">今日のチェックを全部外す</button>
  </div>
  <div class="small">
    ※日付が変わると自動でチェックがリセットされます
  </div>

  <script>
    const STORAGE_KEY = "dailyChecklistData_v3";

    function getTodayString() {
      const d = new Date();
      return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return {
          tasks: [
            { text: "ユメステ：黒VI以上 1回以上クリア", done: false },
            { text: "プロセカ：紫 新規FC 3曲", done: false },
            { text: "プロセカ：Hard以下 新規AP 3曲", done: false }
          ],
          lastDate: getTodayString(),
          streak: 0,
          lastCompletedDate: null
        };
      }
      try {
        return JSON.parse(raw);
      } catch {
        return {
          tasks: [],
          lastDate: getTodayString(),
          streak: 0,
          lastCompletedDate: null
        };
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function render() {
      document.getElementById("today").textContent = "今日：" + getTodayString();
      document.getElementById("streak").textContent = data.streak;

      const list = document.getElementById("taskList");
      list.innerHTML = "";

      // ▼ 全タスク完了時の表示
      const allDone = data.tasks.length > 0 && data.tasks.every(t => t.done);
      if (allDone) {
        list.innerHTML = `
          <div style="
            padding: 30px;
            text-align: center;
            font-size: 20px;
            color: #4caf50;
            font-weight: bold;
          ">
            🎉 お疲れ様でした！今日のタスクは全部完了です 🎉
          </div>
        `;
        return;
      }

      // ▼ 通常のタスクリスト表示
      data.tasks.forEach((task, index) => {
        const div = document.createElement("div");
        div.className = "task";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => {
          task.done = checkbox.checked;
          checkCompleteAndUpdateStreak();
          saveData();
          render();
        });

        const span = document.createElement("span");
        span.textContent = task.text;

        div.appendChild(checkbox);
        div.appendChild(span);
        list.appendChild(div);
      });
    }

    function resetForNewDayIfNeeded() {
      const today = getTodayString();
      if (data.lastDate !== today) {
        data.tasks.forEach(t => t.done = false);
        data.lastDate = today;
        saveData();
      }
    }

    function checkCompleteAndUpdateStreak() {
      const today = getTodayString();
      const allDone = data.tasks.length > 0 && data.tasks.every(t => t.done);

      if (allDone && data.lastCompletedDate !== today) {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.getFullYear() + "-" + (yesterday.getMonth()+1) + "-" + yesterday.getDate();

        if (data.lastCompletedDate === yStr) {
          data.streak += 1;
        } else {
          data.streak = 1;
        }
        data.lastCompletedDate = today;
        saveData();
      }
    }

    let data = loadData();
    resetForNewDayIfNeeded();
    render();

    document.getElementById("addTaskBtn").addEventListener("click", () => {
      const input = document.getElementById("newTask");
      const text = input.value.trim();
      if (!text) return;
      data.tasks.push({ text, done: false });
      input.value = "";
      saveData();
      render();
    });

    document.getElementById("newTask").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("addTaskBtn").click();
      }
    });

    document.getElementById("resetTodayBtn").addEventListener("click", () => {
      data.tasks.forEach(t => t.done = false);
      saveData();
      render();
    });

    setInterval(() => {
      const before = data.lastDate;
      resetForNewDayIfNeeded();
      if (before !== data.lastDate) {
        render();
      }
    }, 60000);
  </script>
</body>
</html>
